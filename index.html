<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</head>

<body class="min-h-screen flex justify-center items-center bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100 p-4">

<div class="bg-white/80 backdrop-blur-lg shadow-2xl rounded-3xl w-full max-w-xl p-6 sm:p-8">

<h1 class="text-2xl sm:text-3xl font-bold text-center mb-6 flex items-center justify-center gap-2">
<i class="bi bi-journal-text text-blue-500"></i>
My Notes
</h1>




<div class="flex flex-col sm:flex-row items-center gap-3 mb-6">

<img 
id="profileImage"
src="https://i.pravatar.cc/100"
class="w-14 h-14 rounded-full object-cover border"
/>

<div class="flex flex-col sm:flex-row gap-2 w-full">

<input
id="profileName"
type="text"
placeholder="Your name"
class="input input-bordered w-full"
/>

<input
id="profileUpload"
type="file"
accept="image/*"
class="file-input file-input-bordered w-full sm:w-36"
/>

</div>

<button onclick="saveProfile()" class="btn btn-secondary w-full sm:w-auto">
Save
</button>

</div>


<!-- NOTE INPUT -->

<div class="flex gap-2 sm:gap-3 mb-6">

<input 
id="noteInput"
type="text"
placeholder="Write your note..."
class="input input-bordered w-full rounded-xl"
/>

<button 
onclick="addNote()" 
class="btn btn-primary rounded-xl px-4 sm:px-6">
<i class="bi bi-plus-lg"></i>
</button>

</div>


<ul id="notesList" class="space-y-3 text-gray-700"></ul>


<p id="emptyMsg" class="text-center text-gray-400 text-sm flex flex-col items-center gap-2 mt-6 animate-pulse">
<i class="bi bi-journal-plus text-4xl text-blue-300"></i>
<span class="font-medium text-gray-500">No notes yet</span>
<span class="text-gray-400 text-xs">Add your daily notes to see them here ✨</span>
</p>

</div>

<script src="script.js"></script>

</body>
</html>
